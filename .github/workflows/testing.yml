name: testing

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v4

      - name: Install poetry
        run: pipx install poetry

      - name: Cache Miniforge
        id: cache
        uses: actions/cache@v3
        with:
          key: ${{ runner.os }}-${{ matrix.python-version }}-miniforge
          path: /home/runner/mamba-cache

      - name: Install Miniforge
        run: |
          if [ ! -f /home/runner/mamba-cache/mamba/etc/profile.d/conda.sh ]; then
            wget -O Miniforge3.sh "https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-$(uname)-$(uname -m).sh"
            bash Miniforge3.sh -b -p "/home/runner/mamba-cache/mamba"
          fi
          source "/home/runner/mamba-cache/mamba/etc/profile.d/conda.sh"
          source "/home/runner/mamba-cache/mamba/etc/profile.d/mamba.sh"
          conda activate base
          mamba --version
          which mamba

      - name: Install dependencies for Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: poetry

      - name: Installation
        run: |
          poetry env use "${{ matrix.python-version }}"
          poetry install

      - name: Install FragGeneScanRs
        run: |
          if command -v cargo &> /dev/null; then
            echo "Cargo is already installed."
          else
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source "$HOME/.cargo/env"
          fi

          cargo install frag_gene_scan_rs

          export PATH="$HOME/.cargo/bin:$PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Testing
        run: |
          export CHLOROSCAN_CONDA_PREFIX=/home/runner/mamba-cache/chloroscan
          export PATH=/home/runner/mamba-cache/mamba/condabin:$PATH
          source /home/runner/mamba-cache/mamba/etc/profile.d/conda.sh
          source /home/runner/mamba-cache/mamba/etc/profile.d/mamba.sh

          which mamba
          which conda
          mamba --version
          conda --version
          conda activate base

          conda config --add channels bioconda
          conda config --set channel_priority strict

          df -H
          poetry run pytest -v -s -o faulthandler_timeout=60